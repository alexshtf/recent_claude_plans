name: Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build universal binary
        run: make universal

      - name: Create app bundle
        run: make app

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: ClaudePlansMenu.app
          path: .build/Claude Plans.app
